<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LLM Wait Switcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <h1>LLM Wait Switcher</h1>

    <section class="card">
      <div class="row space-between">
        <strong>현재 목표 탭</strong>
        <button id="clearTargetTabBtn" class="ghost">해제</button>
      </div>
      <div id="targetInfo" class="target-info">없음</div>
    </section>

    <section class="card">
      <div class="row space-between">
        <strong>열려 있는 탭에서 선택</strong>
        <button id="refreshTabsBtn" class="ghost">새로고침</button>
      </div>

      <label class="label" for="tabSelect">목표 콘텐츠 탭</label>
      <select id="tabSelect"></select>

      <div class="actions">
        <button id="saveSelectedTabBtn">선택한 탭으로 설정</button>
        <button id="setCurrentTabBtn" class="ghost">현재 탭으로 설정</button>
      </div>
      <p class="hint">AI 탭과 다른 탭을 목표 탭으로 지정해야 자동 전환됩니다.</p>
    </section>

    <section class="card">
      <label class="toggle">
        <input type="checkbox" id="autoPlayEnabled">
        <span>전환 시 미디어 자동 재생 시도</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="autoPauseOnReturnEnabled">
        <span>복귀 시 미디어 자동 일시정지 시도</span>
      </label>
    </section>

    <section class="card">
      <strong>상태</strong>
      <div id="runtimeInfo" class="runtime-info">불러오는 중...</div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
